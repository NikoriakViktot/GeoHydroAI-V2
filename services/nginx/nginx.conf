events {}

http {

  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Connection "";

  resolver 127.0.0.11 valid=30s ipv6=off;

  upstream terracotta_upstream {
      zone terracotta 64k;
      server terracotta:5000 resolve;
      keepalive 64;
  }

  upstream fastapi_upstream {
      server api:8000;
      keepalive 64;
  }

  upstream dash_upstream {
      server dash:8050;
  }

  upstream python_course_upstream {
      server web:9000;
  }

##################################################
# GEOHYDROAI HTTP
##################################################

  server {
    listen 80;
    server_name geohydroai.org www.geohydroai.org;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    return 301 https://$host$request_uri;
  }

##################################################
# GEOHYDROAI HTTPS
##################################################

  server {

    listen 443 ssl http2;
    server_name geohydroai.org www.geohydroai.org;

    ssl_certificate /etc/letsencrypt/live/www.geohydroai.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.geohydroai.org/privkey.pem;

    root /var/www/geoai-front/current;
    index index.html;

    client_max_body_size 2048M;

    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    proxy_buffering off;
    proxy_request_buffering off;

##################################################
# DASH
##################################################

    location ^~ /dem/ {
      proxy_pass http://dash_upstream;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "";
    }

    location = /dem {
      return 302 /dem/;
    }

    location /_dash-layout { proxy_pass http://dash_upstream; }
    location /_dash-dependencies { proxy_pass http://dash_upstream; }
    location /_dash-update-component { proxy_pass http://dash_upstream; }

##################################################
# API
##################################################

    location ^~ /api/ {
      proxy_pass http://fastapi_upstream;
    }

##################################################
# TERRACOTTA
##################################################

    location ^~ /tc/ {
      proxy_pass http://terracotta_upstream/;
    }

##################################################
# REPORTS
##################################################

    location /reports/ {
      alias /var/www/geoai-reports/;
      try_files $uri $uri/ =404;
    }

##################################################
# SPA
##################################################

    location / {
      try_files $uri $uri/ /index.html;
    }

##################################################
# STATIC CACHE
##################################################

    location /assets/ {
      expires 7d;
      add_header Cache-Control "public, max-age=604800, immutable";
      access_log off;
    }

##################################################
# DEBUG
##################################################

    location = /__whoami {
      return 200 "I am: $server_name\n";
    }

  }

##################################################
# PYTHON COURSE HTTP
##################################################

  server {
    listen 80;
    server_name python-course-viktor-nikoriak.org www.python-course-viktor-nikoriak.org;

    location ^~ /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    return 301 https://$host$request_uri;
    }

##################################################
# PYTHON COURSE HTTPS
##################################################

  server {

    listen 443 ssl http2;
    server_name python-course-viktor-nikoriak.org www.python-course-viktor-nikoriak.org;

    ssl_certificate /etc/letsencrypt/live/python-course-viktor-nikoriak.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/python-course-viktor-nikoriak.org/privkey.pem;

    location / {
      proxy_pass http://python_course_upstream;
    }

  }

}